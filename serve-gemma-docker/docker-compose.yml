services:
  vllm:
    image: vllm/vllm-openai:gemma
    environment:
      HF_TOKEN: "${HF_TOKEN}"              # exposed as a launch parameter
      VLLM_API_KEY: "${VLLM_API_KEY}"      # exposed as a launch parameter
      VLLM_USE_V2_MODEL_RUNNER: "1"        # hardcoded, not a parameter at all
    ports:
      - "8000:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      nvidia/Gemma-4-26B-A4B-NVFP4
      --trust-remote-code
      --served-model-name gemma-26B
      --max-num-seqs 1
      --max-num-batched-tokens 8192
      --max-model-len 262144
      --attention-backend TRITON_ATTN
      --enable-auto-tool-choice
      --tool-call-parser gemma4
      --reasoning-parser gemma4
      --generation-config vllm
      --default-chat-template-kwargs '{"enable_thinking":true}'
      --host 0.0.0.0
      --port 8000
      --api-key "${VLLM_API_KEY}"
      --gpu-memory-utilization 0.95
volumes:
  huggingface-cache:
