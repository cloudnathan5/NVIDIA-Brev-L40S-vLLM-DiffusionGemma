apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: huggingface-cache
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
---
apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: gemma-disagg
spec:
  components:
    - name: Frontend
      type: frontend
      replicas: 1
      podTemplate:
        spec:
          containers:
            - name: main
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.1
              env:
                - name: DYN_CHAT_PROCESSOR
                  value: dynamo
                - name: VLLM_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: vllm-api-key
                      key: VLLM_API_KEY
                      optional: true
              volumeMounts:
                - name: huggingface-cache
                  mountPath: /models
          volumes:
            - name: huggingface-cache
              persistentVolumeClaim:
                claimName: huggingface-cache

    - name: VllmDecodeWorker
      type: worker
      replicas: 1
      podTemplate:
        spec:
          initContainers:
            - name: model-download
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.1
              command: [python3, -c]
              args:
                - |
                  import fcntl
                  from pathlib import Path
                  from huggingface_hub import snapshot_download

                  model_dir = Path("/models/gemma-4-26b-a4b-nvfp4")
                  model_dir.mkdir(parents=True, exist_ok=True)
                  with Path("/models/.gemma-download.lock").open("w") as lock:
                      fcntl.flock(lock, fcntl.LOCK_EX)
                      if not (model_dir / ".download-complete").exists():
                          snapshot_download(
                              "nvidia/Gemma-4-26B-A4B-NVFP4",
                              local_dir=model_dir,
                              max_workers=1,
                          )
                          (model_dir / ".download-complete").touch()
              envFrom:
                - secretRef:
                    name: hf-token-secret
                    optional: true
              volumeMounts:
                - name: huggingface-cache
                  mountPath: /models
          containers:
            - name: main
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.1
              workingDir: /workspace/examples/backends/vllm
              command: [python3, -m, dynamo.vllm]
              args:
                - --model
                - /models/gemma-4-26b-a4b-nvfp4
                - --disaggregation-mode
                - decode
                - --kv-transfer-config
                - '{"kv_connector":"NixlConnector","kv_role":"kv_both"}'
                - --no-disable-hybrid-kv-cache-manager
                - --trust-remote-code
                - --served-model-name
                - gemma-26B
                - --max-num-seqs
                - "1"
                - --max-num-batched-tokens
                - "8192"
                - --max-model-len
                - "262144"
                - --attention-backend
                - TRITON_ATTN
                - --dyn-tool-call-parser
                - gemma4
                - --dyn-reasoning-parser
                - gemma4
                - --generation-config
                - vllm
                - --gpu-memory-utilization
                - "0.95"
              envFrom:
                - secretRef:
                    name: hf-token-secret
                    optional: true
              env:
                - name: VLLM_USE_V2_MODEL_RUNNER
                  value: "1"
                - name: VLLM_CACHE_ROOT
                  value: /models/.vllm-cache/decode
              resources:
                limits:
                  nvidia.com/gpu: "1"
                requests:
                  ephemeral-storage: 20Gi
              startupProbe:
                httpGet:
                  path: /health
                  port: system
                failureThreshold: 720
                periodSeconds: 10
                timeoutSeconds: 5
              livenessProbe:
                httpGet:
                  path: /live
                  port: system
                failureThreshold: 6
                periodSeconds: 10
                timeoutSeconds: 5
              volumeMounts:
                - name: huggingface-cache
                  mountPath: /models
          volumes:
            - name: huggingface-cache
              persistentVolumeClaim:
                claimName: huggingface-cache

    - name: VllmPrefillWorker
      type: worker
      replicas: 1
      podTemplate:
        spec:
          initContainers:
            - name: model-download
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.1
              command: [python3, -c]
              args:
                - |
                  import fcntl
                  from pathlib import Path
                  from huggingface_hub import snapshot_download

                  model_dir = Path("/models/gemma-4-26b-a4b-nvfp4")
                  model_dir.mkdir(parents=True, exist_ok=True)
                  with Path("/models/.gemma-download.lock").open("w") as lock:
                      fcntl.flock(lock, fcntl.LOCK_EX)
                      if not (model_dir / ".download-complete").exists():
                          snapshot_download(
                              "nvidia/Gemma-4-26B-A4B-NVFP4",
                              local_dir=model_dir,
                              max_workers=1,
                          )
                          (model_dir / ".download-complete").touch()
              envFrom:
                - secretRef:
                    name: hf-token-secret
                    optional: true
              volumeMounts:
                - name: huggingface-cache
                  mountPath: /models
          containers:
            - name: main
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.1
              workingDir: /workspace/examples/backends/vllm
              command: [python3, -m, dynamo.vllm]
              args:
                - --model
                - /models/gemma-4-26b-a4b-nvfp4
                - --disaggregation-mode
                - prefill
                - --kv-transfer-config
                - '{"kv_connector":"NixlConnector","kv_role":"kv_both"}'
                - --no-disable-hybrid-kv-cache-manager
                - --trust-remote-code
                - --served-model-name
                - gemma-26B
                - --max-num-seqs
                - "1"
                - --max-num-batched-tokens
                - "8192"
                - --max-model-len
                - "262144"
                - --attention-backend
                - TRITON_ATTN
                - --dyn-tool-call-parser
                - gemma4
                - --dyn-reasoning-parser
                - gemma4
                - --generation-config
                - vllm
                - --gpu-memory-utilization
                - "0.95"
              envFrom:
                - secretRef:
                    name: hf-token-secret
                    optional: true
              env:
                - name: VLLM_USE_V2_MODEL_RUNNER
                  value: "1"
                - name: VLLM_CACHE_ROOT
                  value: /models/.vllm-cache/prefill
              resources:
                limits:
                  nvidia.com/gpu: "1"
                requests:
                  ephemeral-storage: 20Gi
              startupProbe:
                httpGet:
                  path: /health
                  port: system
                failureThreshold: 720
                periodSeconds: 10
                timeoutSeconds: 5
              livenessProbe:
                httpGet:
                  path: /live
                  port: system
                failureThreshold: 6
                periodSeconds: 10
                timeoutSeconds: 5
              volumeMounts:
                - name: huggingface-cache
                  mountPath: /models
          volumes:
            - name: huggingface-cache
              persistentVolumeClaim:
                claimName: huggingface-cache
